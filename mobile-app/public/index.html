<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6C63FF">
    <meta name="description" content="Diamond Bot Admin Panel - Mobile App">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DiamondBot">
    
    <title>Diamond Bot - Mobile Admin</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Styles -->
    <link rel="stylesheet" href="/css/mobile.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <div class="app-logo">
                <div class="logo-icon">💎</div>
                <h1>Diamond Bot</h1>
                <p>মোবাইল অ্যাডমিন প্যানেল</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>ইমেইল</label>
                    <input type="email" id="loginEmail" placeholder="আপনার ইমেইল" required>
                </div>
                
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="loginPassword" placeholder="আপনার পাসওয়ার্ড" required>
                </div>
                
                <div class="form-group checkbox">
                    <label>
                        <input type="checkbox" id="rememberMe">
                        <span>আমাকে মনে রাখুন</span>
                    </label>
                </div>
                
                <button type="submit" class="btn-primary">লগইন করুন</button>
                <div id="loginError" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Main App Screen -->
    <div id="appScreen" class="screen hidden">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-content">
                <h2>💎 Diamond Bot</h2>
                <button id="logoutBtn" class="icon-btn">🚪</button>
            </div>
        </div>

        <!-- Navigation Tabs -->
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="dashboard">📊 ড্যাশবোর্ড</button>
            <button class="nav-tab" data-tab="groups">👥 গ্রুপ</button>
            <button class="nav-tab" data-tab="payments">💰 পেমেন্ট</button>
            <button class="nav-tab" data-tab="settings">⚙️ সেটিংস</button>
        </div>

        <!-- Content Area -->
        <div class="content">
            <!-- Dashboard Tab -->
            <div id="dashboardTab" class="tab-content active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">👥</div>
                        <div class="stat-info">
                            <div class="stat-label">মোট ইউজার</div>
                            <div class="stat-value" id="totalUsers">0</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">💎</div>
                        <div class="stat-info">
                            <div class="stat-label">মোট ডায়মন্ড</div>
                            <div class="stat-value" id="totalDiamonds">0</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">💰</div>
                        <div class="stat-info">
                            <div class="stat-label">মোট পেমেন্ট</div>
                            <div class="stat-value" id="totalPayments">0</div>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon">📊</div>
                        <div class="stat-info">
                            <div class="stat-label">অ্যাক্টিভ গ্রুপ</div>
                            <div class="stat-value" id="activeGroups">0</div>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h3>সাম্প্রতিক কার্যক্রম</h3>
                    <div id="recentActivity" class="activity-list"></div>
                </div>
            </div>

            <!-- Groups Tab -->
            <div id="groupsTab" class="tab-content">
                <div class="section">
                    <h3>সব গ্রুপ</h3>
                    <div id="groupsList" class="groups-list"></div>
                </div>
            </div>

            <!-- Payments Tab -->
            <div id="paymentsTab" class="tab-content">
                <div class="section">
                    <h3>পেমেন্ট লিস্ট</h3>
                    <div id="paymentsList" class="payments-list"></div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="settingsTab" class="tab-content">
                <div class="section">
                    <h3>অ্যাপ সেটিংস</h3>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-label">নোটিফিকেশন</div>
                            <div class="setting-desc">নতুন পেমেন্টের জন্য নোটিফিকেশন পান</div>
                        </div>
                        <label class="toggle">
                            <input type="checkbox" id="notificationToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <div class="setting-label">অটো রিফ্রেশ</div>
                            <div class="setting-desc">ডেটা অটোমেটিক আপডেট হবে</div>
                        </div>
                        <label class="toggle">
                            <input type="checkbox" id="autoRefreshToggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                    
                    <button id="clearCacheBtn" class="btn-secondary">ক্যাশ ক্লিয়ার করুন</button>
                    <button id="installBtn" class="btn-primary" style="display: none;">হোম স্ক্রিনে যোগ করুন</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="spinner hidden">
        <div class="spinner-circle"></div>
    </div>

    <script src="/js/mobile-app.js"></script>
</body>
</html>
